name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Download FFmpeg and FFprobe
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'ffmpeg.zip'
          $extract = Join-Path $env:RUNNER_TEMP 'ffmpeg'
          Invoke-WebRequest 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip' -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $extract
          $ffmpeg = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter 'ffmpeg.exe' | Select-Object -First 1
          $ffprobe = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter 'ffprobe.exe' | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw 'FFmpeg package is incomplete.' }
          "VIDEO_TOOLKIT_MEDIA_BIN=$($ffmpeg.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build portable application
        shell: pwsh
        run: .\build.ps1

      - name: Package final artifact
        shell: pwsh
        run: |
          Rename-Item -LiteralPath 'dist_folder\VideoToolkit\VideoToolkit.exe' -NewName '视频工具合集.exe'
          New-Item -ItemType Directory -Path 'dist_final' -Force | Out-Null
          $archive = "dist_final\video-toolkit-windows-x64-${{ github.ref_name }}.zip"
          Compress-Archive -Path 'dist_folder\VideoToolkit\*' -DestinationPath $archive -CompressionLevel Optimal

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist_final/*.zip'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-toolkit-windows-x64
          path: dist_final/*.zip
          if-no-files-found: error

  release:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
